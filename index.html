<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Zoo | Florida B.E.S.T. K-Math</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. LAYOUT & CENTERING */
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centering for PC */
            justify-content: center; /* Centering for Mobile */
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: #1e293b;
            touch-action: manipulation; /* Prevents zooming when tapping dots */
            overflow: hidden;
        }

        .zoo-header {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
        }

        /* 2. RESPONSIVE BOXES */
        .instructions {
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            width: 95%;
            max-width: 550px;
            border: 3px solid #3b82f6;
            font-weight: 700;
            box-sizing: border-box;
        }

        .card-container {
            width: 95%;
            max-width: 550px;
            aspect-ratio: 4 / 3; /* Maintains the same rectangle shape on all devices */
            perspective: 1200px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            background: white;
            border: 8px solid #3b82f6;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #ecfdf5;
            border-color: #10b981;
        }

        /* 3. THE DOT CAGE */
        #object-area {
            position: relative;
            width: 90%;
            height: 70%;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden; /* This is the safety net */
            border: 2px dashed #cbd5e1;
        }

        .dot {
            width: clamp(35px, 10vw, 55px); /* Dots scale with screen size */
            height: clamp(35px, 10vw, 55px);
            background-color: #3b82f6;
            border: 4px solid #1e3a8a;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s, left 0.6s ease, top 0.6s ease;
            z-index: 10;
        }

        .dot.counted {
            background-color: #22c55e;
            border-color: #14532d;
            transform: scale(1.1);
        }

        .digit { 
            font-size: clamp(100px, 25vw, 180px); 
            font-weight: 700; 
            color: #064e3b; 
        }

        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8;
        }

        .reset-btn { background: #10b981; box-shadow: 0 4px 0 #047857; }
    </style>
</head>
<body>

    <div class="zoo-header">🦁🐯🐘🦛</div>

    <div class="instructions" id="inst">Tap the dots to count! 🦁</div>

    <div class="card-container" id="gameCard">
        <div class="card-inner">
            <div class="card-face card-front">
                <div id="object-area"></div>
                <button class="btn" id="flipBtn">Done Counting!</button>
            </div>
            <div class="card-face card-back">
                <div style="font-size: 1.5rem;">🦁 Great Job!</div>
                <div class="digit" id="numeral">0</div>
                <button class="btn reset-btn" onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP9TrLurt53v4dFAdCc60h0Dszitbym3w",
            authDomain: "sample-deals-app.firebaseapp.com",
            projectId: "sample-deals-app",
            storageBucket: "sample-deals-app.firebasestorage.app",
            messagingSenderId: "926143400812",
            appId: "1:926143400812:web:7aa6083d269e4298424149"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const objectArea = document.getElementById('object-area');
        const card = document.getElementById('gameCard');
        const numeralDisplay = document.getElementById('numeral');
        const inst = document.getElementById('inst');
        let currentCount = 0;

        // Save progress to your dashboard
        async function recordProgress(count) {
            try {
                await addDoc(collection(db, "student_progress"), {
                    benchmark_id: "MA.K.NSO.1.1",
                    value_counted: count,
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        }

        function initLevel() {
            card.classList.remove('is-flipped');
            objectArea.innerHTML = '';
            currentCount = Math.floor(Math.random() * 15) + 1; // Limit to 15 for better mobile fit
            numeralDisplay.innerText = currentCount;

            // Accurate measurements of the "Cage"
            const areaW = objectArea.clientWidth;
            const areaH = objectArea.clientHeight;
            const dotSize = areaW * 0.12; 

            for (let i = 0; i < currentCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                // Safe placement math: Keeps dots at least 5% away from edges
                const maxX = areaW - dotSize - (areaW * 0.05);
                const maxY = areaH - dotSize - (areaH * 0.05);
                
                dot.style.left = (Math.random() * maxX + (areaW * 0.02)) + 'px';
                dot.style.top = (Math.random() * maxY + (areaH * 0.02)) + 'px';

                dot.onclick = (e) => {
                    e.stopPropagation();
                    dot.classList.toggle('counted');
                };
                objectArea.appendChild(dot);
            }
        }

        function shuffleAndReveal() {
            inst.innerText = "The dots moved! Still " + currentCount + "?";
            const dots = document.querySelectorAll('.dot');
            
            dots.forEach(dot => {
                const maxX = objectArea.clientWidth - (objectArea.clientWidth * 0.15);
                const maxY = objectArea.clientHeight - (objectArea.clientHeight * 0.15);
                dot.style.left = (Math.random() * maxX) + 'px';
                dot.style.top = (Math.random() * maxY) + 'px';
            });

            setTimeout(() => {
                card.classList.add('is-flipped');
                inst.innerText = "Correct! It is " + currentCount + ".";
                recordProgress(currentCount);
            }, 1000);
        }

        document.getElementById('flipBtn').addEventListener('click', shuffleAndReveal);
        window.resetGame = () => { inst.innerText = "Tap the dots to count! 🦁"; initLevel(); };
        window.onload = initLevel;
    </script>
</body>
</html>
