<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Zoo | ThresholdEd</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: none; /* Required for the tracing canvas */
            overflow: hidden;
        }

        .zoo-header { font-size: 3rem; margin: 10px 0; }

        .instructions {
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
            width: 90%;
            max-width: 500px;
            border: 4px solid #3b82f6;
            font-weight: 700;
        }

        .card-container {
            width: 95%;
            max-width: 500px;
            aspect-ratio: 1 / 1; /* Square for better tracing space */
            position: relative;
        }

        .game-box {
            width: 100%;
            height: 100%;
            background: white;
            border: 8px solid #3b82f6;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #object-area { position: absolute; width: 100%; height: 100%; }

        .dot {
            width: 55px;
            height: 55px;
            background-color: #3b82f6;
            border: 4px solid #1e3a8a;
            border-radius: 50%;
            position: absolute;
            transition: left 0.8s ease, top 0.8s ease;
            z-index: 10;
        }

        .dot.counted { background-color: #22c55e; border-color: #14532d; }

        /* Tracing Styles */
        #trace-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            display: none; /* Hidden until counting is done */
        }

        .trace-prompt {
            position: absolute;
            font-size: 180px;
            color: rgba(0, 0, 0, 0.1); /* Dotted/Light effect */
            border: 5px dotted #cbd5e1;
            padding: 20px;
            border-radius: 20px;
            pointer-events: none;
            user-select: none;
            display: none;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 700;
            background: #2563eb;
            color: white;
            border-radius: 20px;
            border: none;
            box-shadow: 0 5px 0 #1d4ed8;
            cursor: pointer;
            z-index: 30;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="zoo-header">🦁🐯🐘🦛</div>

    <div class="instructions" id="inst">Tap the dots to count! 🦁</div>

    <div class="card-container">
        <div class="game-box" id="mainBox">
            <div id="object-area"></div>
            <div id="trace-template" class="trace-prompt">0</div>
            <canvas id="trace-canvas"></canvas>
        </div>
    </div>

    <button class="btn" id="checkBtn">Check ✅</button>
    <button class="btn hidden" id="nextBtn">Next Level ➡️</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP9TrLurt53v4dFAdCc60h0Dszitbym3w",
            authDomain: "sample-deals-app.firebaseapp.com",
            projectId: "sample-deals-app",
            storageBucket: "sample-deals-app.firebasestorage.app",
            messagingSenderId: "926143400812",
            appId: "1:926143400812:web:7aa6083d269e4298424149"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const area = document.getElementById('object-area');
        const inst = document.getElementById('inst');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const traceTemplate = document.getElementById('trace-template');
        const canvas = document.getElementById('trace-canvas');
        const ctx = canvas.getContext('2d');

        let count = 0;
        let isTracing = false;

        function initLevel() {
            area.innerHTML = '';
            count = Math.floor(Math.random() * 10) + 1; // Keeping it to 10 for tracing clarity
            traceTemplate.innerText = count;
            
            // Layout dots with "Social Distancing" to avoid clumping
            const positions = [];
            for (let i = 0; i < count; i++) {
                let pos;
                let overlap = true;
                while(overlap) {
                    pos = { x: Math.random() * 80 + 5, y: Math.random() * 80 + 5 };
                    overlap = positions.some(p => Math.abs(p.x - pos.x) < 12 && Math.abs(p.y - pos.y) < 12);
                }
                positions.push(pos);
                
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.left = pos.x + '%';
                dot.style.top = pos.y + '%';
                dot.onclick = () => dot.classList.toggle('counted');
                area.appendChild(dot);
            }
        }

        function startRearrangement() {
            checkBtn.classList.add('hidden');
            inst.innerText = "The animals moved! Are there still " + count + "?";
            
            // Rearrange dots
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => {
                d.style.left = (Math.random() * 80 + 5) + '%';
                d.style.top = (Math.random() * 80 + 5) + '%';
            });

            // WAIT 5 SECONDS (Teacher's requirement for processing)
            setTimeout(() => {
                showTracingMode();
            }, 5000);
        }

        function showTracingMode() {
            inst.innerText = "Correct! Now trace the number " + count + " ✍️";
            traceTemplate.style.display = 'block';
            canvas.style.display = 'block';
            resizeCanvas();
            setupTracing();
            nextBtn.classList.remove('hidden');
            
            // Log to Firebase
            addDoc(collection(db, "student_progress"), {
                benchmark: "MA.K.NSO.1.1",
                value: count,
                timestamp: serverTimestamp()
            });
        }

        // --- TRACING LOGIC ---
        function setupTracing() {
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, 
                         y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
            };

            const start = (e) => { isTracing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const draw = (e) => { if(!isTracing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => { isTracing = false; };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stop);
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }

        checkBtn.onclick = startRearrangement;
        nextBtn.onclick = () => location.reload();

        window.onload = initLevel;
    </script>
</body>
</html>
