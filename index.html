<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Zoo | ThresholdEd</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: none;
            overflow: hidden;
        }

        /* 1. PEDAGOGICAL FONT FIX: Using a clean serif-free style for numerals */
        .trace-prompt {
            font-family: 'Courier New', Courier, monospace; /* Ensures '1' is a straight line */
            font-size: 240px;
            color: rgba(0, 0, 0, 0.05);
            -webkit-text-stroke: 4px #cbd5e1;
            font-weight: 900;
            pointer-events: none;
            text-align: center;
        }

        .zoo-header { font-size: clamp(2rem, 8vw, 3rem); margin: 10px 0; }
        .instructions {
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
            width: 90%;
            max-width: 650px;
            border: 4px solid #3b82f6;
            font-weight: 700;
        }

        .card-container {
            width: 95%;
            max-width: 750px;
            aspect-ratio: 16 / 9; 
            position: relative;
            background: white;
            border: 8px solid #3b82f6;
            border-radius: 30px;
            display: flex;
            overflow: hidden;
        }

        #object-area { 
            flex: 1.2; 
            position: relative; 
            height: 100%;
            border-right: 3px dashed #cbd5e1;
            background: #fafafa;
        }

        #trace-area {
            flex: 1;
            display: none; 
            position: relative;
            background: #ffffff;
            align-items: center;
            justify-content: center;
        }

        .dot {
            background-color: #3b82f6;
            border: 4px solid #1e3a8a;
            border-radius: 50%;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        .dot.counted { background-color: #22c55e; border-color: #14532d; }

        #trace-canvas { position: absolute; top: 0; left: 0; z-index: 25; }

        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 700;
            background: #2563eb;
            color: white;
            border-radius: 20px;
            border: none;
            box-shadow: 0 5px 0 #1d4ed8;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="zoo-header">🦁🐯🐘🦛</div>
    <div class="instructions" id="inst">Tap the dots to count! 🦁</div>

    <div class="card-container">
        <div id="object-area"></div>
        <div id="trace-area">
            <div id="trace-template" class="trace-prompt">0</div>
            <canvas id="trace-canvas"></canvas>
        </div>
    </div>

    <button class="btn" id="checkBtn">Check ✅</button>
    <button class="btn hidden" id="nextBtn">Next Level ➡️</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP9TrLurt53v4dFAdCc60h0Dszitbym3w",
            authDomain: "sample-deals-app.firebaseapp.com",
            projectId: "sample-deals-app",
            storageBucket: "sample-deals-app.firebasestorage.app",
            messagingSenderId: "926143400812",
            appId: "1:926143400812:web:7aa6083d269e4298424149"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const area = document.getElementById('object-area');
        const traceArea = document.getElementById('trace-area');
        const inst = document.getElementById('inst');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const traceTemplate = document.getElementById('trace-template');
        const canvas = document.getElementById('trace-canvas');
        const ctx = canvas.getContext('2d');

        let count = 0;
        let isTracing = false;
        let dotDiameter = 45;

        function initLevel() {
            area.innerHTML = '';
            count = Math.floor(Math.random() * 20) + 1; 
            traceTemplate.innerText = count;
            dotDiameter = (count > 10) ? 32 : 45;

            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = dotDiameter + 'px';
                dot.style.height = dotDiameter + 'px';
                dot.style.left = (Math.random() * 85 + 5) + '%';
                dot.style.top = (Math.random() * 80 + 5) + '%';
                dot.onclick = () => dot.classList.toggle('counted');
                area.appendChild(dot);
            }
        }

        function rearrangeIntoGroups() {
            checkBtn.classList.add('hidden');
            inst.innerText = "The animals moved! Are there still " + count + "?";
            
            const dots = Array.from(document.querySelectorAll('.dot'));
            const groupSizes = [5, 3, 2];
            let remaining = count;
            let dotIndex = 0;

            const clusters = [];
            while (remaining > 0) {
                let size = groupSizes.find(s => s <= remaining) || 1;
                clusters.push(size);
                remaining -= size;
            }

            clusters.forEach((size, clusterIndex) => {
                const centerX = (Math.random() * 60 + 15); 
                const centerY = (Math.random() * 60 + 15);

                for (let i = 0; i < size; i++) {
                    const d = dots[dotIndex++];
                    const spacing = dotDiameter + 10;
                    const offsetX = (i % 3) * (spacing / 4);
                    const offsetY = Math.floor(i / 3) * (spacing / 4);
                    d.style.left = (centerX + offsetX) + '%';
                    d.style.top = (centerY + offsetY) + '%';
                }
            });

            // 5 SECOND PAUSE for Standard-aligned Processing
            setTimeout(() => { showTracingMode(); }, 5000);
        }

        function showTracingMode() {
            inst.innerText = "Still " + count + "! Now trace the number ✍️";
            traceArea.style.display = 'flex';
            canvas.width = traceArea.clientWidth;
            canvas.height = traceArea.clientHeight;
            setupTracing();
            nextBtn.classList.remove('hidden');

            addDoc(collection(db, "student_progress"), {
                benchmark: "MA.K.NSO.1.1",
                value: count,
                timestamp: serverTimestamp()
            });
        }

        function setupTracing() {
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };
            canvas.onmousedown = canvas.ontouchstart = (e) => { 
                e.preventDefault(); isTracing = true; ctx.beginPath(); 
                const p = getPos(e); ctx.moveTo(p.x, p.y); 
            };
            window.onmousemove = window.ontouchmove = (e) => { 
                if(!isTracing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); 
            };
            window.onmouseup = window.ontouchend = () => { isTracing = false; };
        }

        checkBtn.onclick = rearrangeIntoGroups;
        nextBtn.onclick = () => location.reload();
        window.onload = initLevel;
    </script>
</body>
</html>
