<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Zoo | Florida B.E.S.T. K-Math</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #1e293b;
            touch-action: manipulation;
        }

        .zoo-header {
            font-size: 3rem;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .instructions {
            background: #ffffff;
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            font-size: 1.4rem;
            max-width: 600px;
            border: 3px solid #3b82f6;
            font-weight: 700;
        }

        .card-container {
            width: 550px; 
            height: 400px;
            perspective: 1200px;
        }

        @media (max-width: 600px) {
            .card-container {
                width: 90vw;
                height: 110vw;
            }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            background: white;
            border: 10px solid #3b82f6;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #ecfdf5;
            border-color: #10b981;
        }

        #object-area {
            position: relative;
            width: 92%;
            height: 72%;
            background: #ffffff;
            border-radius: 25px;
            overflow: hidden;
        }

        .dot {
            width: 50px;
            height: 50px;
            background-color: #3b82f6;
            border: 5px solid #1e3a8a;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s ease, background-color 0.3s ease, left 0.8s ease, top 0.8s ease;
            z-index: 10;
        }

        .dot.counted {
            background-color: #22c55e;
            border-color: #14532d;
            transform: scale(1.15);
        }

        .digit { 
            font-size: 180px; 
            font-weight: 700; 
            color: #064e3b; 
            line-height: 1;
            margin: 0; 
        }

        .btn {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: 700;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            box-shadow: 0 4px 0 #1d4ed8;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        .reset-btn { 
            background: #10b981; 
            box-shadow: 0 4px 0 #047857;
        }
    </style>
</head>
<body>

    <div class="zoo-header">
        <span>🦁</span><span>🐯</span><span>🐘</span><span>🦛</span>
    </div>

    <div class="instructions" id="inst">
        Tap the dots to count! 🦁
    </div>

    <div class="card-container" id="gameCard">
        <div class="card-inner">
            <div class="card-face card-front">
                <div id="object-area"></div>
                <button class="btn" id="flipBtn">Done Counting!</button>
            </div>

            <div class="card-face card-back">
                <div style="font-size: 50px;">🦁 Great Job!</div>
                <div class="digit" id="numeral">0</div>
                <button class="btn reset-btn" onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP9TrLurt53v4dFAdCc60h0Dszitbym3w",
            authDomain: "sample-deals-app.firebaseapp.com",
            projectId: "sample-deals-app",
            storageBucket: "sample-deals-app.firebasestorage.app",
            messagingSenderId: "926143400812",
            appId: "1:926143400812:web:7aa6083d269e4298424149"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GAME LOGIC ---
        const objectArea = document.getElementById('object-area');
        const card = document.getElementById('gameCard');
        const numeralDisplay = document.getElementById('numeral');
        const inst = document.getElementById('inst');
        let currentCount = 0;

        async function recordProgress(countValue) {
            try {
                // This sends data to the 'student_progress' folder we unlocked in Rules
                await addDoc(collection(db, "student_progress"), {
                    benchmark_id: "MA.K.NSO.1.1", // Standard: Count to 20
                    value_counted: countValue,
                    timestamp: serverTimestamp(),
                    status: "success"
                });
                console.log("Progress saved to ThresholdEd Dashboard!");
            } catch (e) {
                console.error("Error saving progress: ", e);
            }
        }

        function initLevel() {
            card.classList.remove('is-flipped');
            objectArea.innerHTML = '';
            currentCount = Math.floor(Math.random() * 20) + 1;
            numeralDisplay.innerText = currentCount;

            const padding = 70;
            const areaW = objectArea.offsetWidth - padding;
            const areaH = objectArea.offsetHeight - padding;

            for (let i = 0; i < currentCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                if (currentCount <= 10) {
                    dot.style.left = (Math.random() * areaW) + (padding/2) + 'px';
                    dot.style.top = (Math.random() * areaH) + (padding/2) + 'px';
                } else {
                    const cols = 5;
                    const spacingX = areaW / 4.2;
                    const spacingY = areaH / 3.2;
                    dot.style.left = (i % cols) * spacingX + 35 + 'px';
                    dot.style.top = Math.floor(i / cols) * spacingY + 35 + 'px';
                }

                dot.onclick = (e) => {
                    e.stopPropagation();
                    dot.classList.toggle('counted');
                };
                
                objectArea.appendChild(dot);
            }
        }

        function shuffleAndReveal() {
            inst.innerText = "The dots moved! Is it still " + currentCount + "?";
            
            const dots = document.querySelectorAll('.dot');
            const padding = 70;
            const areaW = objectArea.offsetWidth - padding;
            const areaH = objectArea.offsetHeight - padding;

            dots.forEach(dot => {
                dot.style.left = (Math.random() * areaW) + (padding/2) + 'px';
                dot.style.top = (Math.random() * areaH) + (padding/2) + 'px';
            });

            setTimeout(() => {
                card.classList.add('is-flipped');
                inst.innerText = "There are " + currentCount + "! 🦁";
                
                // TELEMETRY: Record the success when the card flips
                recordProgress(currentCount);
            }, 1200);
        }

        document.getElementById('flipBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            shuffleAndReveal();
        });

        window.resetGame = function() {
            inst.innerText = "Tap the dots to count! 🦁";
            initLevel();
        }

        window.onload = initLevel;
        window.onresize = initLevel;
    </script>
</body>
</html>
