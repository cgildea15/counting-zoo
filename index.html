<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Zoo | Florida B.E.S.T. K-Math</title>
    <style>
        body {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .instructions {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card-container {
            width: 350px;
            height: 500px;
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: white;
            border: 6px solid #2980b9;
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: #e8f4fd;
        }
        /* Container for dots */
        #object-area {
            position: relative;
            width: 280px;
            height: 280px;
            background: #f9f9f9;
            border-radius: 10px;
            margin: 20px 0;
        }
        .dot {
            width: 35px;
            height: 35px;
            background-color: #3498db;
            border-radius: 50%;
            position: absolute;
            transition: all 0.5s ease;
            cursor: pointer;
            border: 2px solid #2471a3;
        }
        .dot.counted {
            background-color: #2ecc71; /* Green when clicked */
            border-color: #27ae60;
        }
        .digit { font-size: 160px; color: #2c3e50; margin: 0; }
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn:hover { background: #d35400; }
    </style>
</head>
<body>

    <h1 style="color: #1a5276; margin-bottom: 5px;">Counting Zoo 🦁</h1>
    
    <div class="instructions" id="inst">
        Count the blue dots. Tap them to keep track!
    </div>

    <div class="card-container" id="gameCard">
        <div class="card-inner">
            <div class="card-face card-front">
                <div id="object-area"></div>
                <button class="btn" id="flipBtn">Check My Answer!</button>
            </div>

            <div class="card-face card-back">
                <div class="digit" id="numeral">0</div>
                <p style="font-size: 20px; color: #7f8c8d;">Did you get it right?</p>
                <button class="btn" onclick="resetGame()">Play Next!</button>
            </div>
        </div>
    </div>

    <script>
        const objectArea = document.getElementById('object-area');
        const card = document.getElementById('gameCard');
        const numeralDisplay = document.getElementById('numeral');
        const inst = document.getElementById('inst');
        let currentCount = 0;

        function initLevel() {
            card.classList.remove('is-flipped');
            objectArea.innerHTML = '';
            // Standard: Up to 20 objects
            currentCount = Math.floor(Math.random() * 20) + 1;
            numeralDisplay.innerText = currentCount;

            // Clarification 2: Scattered for <= 10, Line/Array for > 10
            const isScattered = currentCount <= 10;
            
            for (let i = 0; i < currentCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                if (isScattered) {
                    // Random positions
                    dot.style.left = Math.random() * 240 + 'px';
                    dot.style.top = Math.random() * 240 + 'px';
                } else {
                    // Rectangular Array (Standard says array is fine for 20)
                    const cols = 5;
                    dot.style.left = (i % cols) * 50 + 40 + 'px';
                    dot.style.top = Math.floor(i / cols) * 50 + 40 + 'px';
                }

                // One-to-one correspondence tracking
                dot.onclick = (e) => {
                    e.stopPropagation();
                    dot.classList.toggle('counted');
                };
                
                objectArea.appendChild(dot);
            }
        }

        // Shuffle logic for "rearrangement" part of the standard
        function shuffleObjects() {
            inst.innerText = "Look! The dots moved. Is it still the same number?";
            const dots = document.querySelectorAll('.dot');
            dots.forEach(dot => {
                dot.style.left = Math.random() * 240 + 'px';
                dot.style.top = Math.random() * 240 + 'px';
            });

            // Flip card after a short delay to see the rearrangement
            setTimeout(() => {
                card.classList.add('is-flipped');
                inst.innerText = "It's still " + currentCount + "!";
            }, 1200);
        }

        document.getElementById('flipBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            shuffleObjects();
        });

        function resetGame() {
            inst.innerText = "Count the blue dots. Tap them to keep track!";
            initLevel();
        }

        // Start first game
        initLevel();
    </script>

</body>
</html>
