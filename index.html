<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Zoo | K-Math Game</title>
    <style>
        body {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card-container {
            width: 300px;
            height: 450px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: white;
            border: 4px solid #2980b9;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .card-back {
            transform: rotateY(180deg);
            color: #1a5276;
        }
        .dots-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .dot {
            width: 30px;
            height: 30px;
            background-color: #2980b9;
            border-radius: 50%;
        }
        .digit { font-size: 150px; font-weight: bold; margin: 0; }
        .prompt { font-size: 24px; color: #e67e22; font-weight: bold; text-align: center; padding: 10px; }
    </style>
</head>
<body>

    <h1 style="color: #1a5276;">Counting Zoo 🦁</h1>

    <div class="card-container" id="gameCard">
        <div class="card-inner">
            
            <div class="card-face card-front">
                <div style="font-size: 80px;">🦁</div>
                <div class="dots-grid">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <p style="color: #7f8c8d; margin-top: 20px;">Count the dots, then tap!</p>
            </div>

            <div class="card-back card-face">
                <div class="digit">10</div>
                <div class="prompt">Now say the number!</div>
            </div>

        </div>
    </div>

    <script>
        const card = document.getElementById('gameCard');
        card.addEventListener('click', function() {
            card.classList.toggle('is-flipped');
        });
    </script>

</body>
</html>
