<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Counting Zoo v2.0 | ThresholdEd</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: none;
            overflow: hidden;
        }

        .zoo-header { font-size: 2.2rem; margin: 5px 0; }

        .instructions {
            background: #ffffff;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.1rem;
            width: 90%;
            max-width: 450px;
            border: 4px solid #3b82f6;
            font-weight: 700;
        }

        /* Forced Vertical Layout for Mobile */
        .card-container {
            width: 95%;
            max-width: 400px;
            height: 70vh; 
            position: relative;
            background: white;
            border: 8px solid #3b82f6;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #object-area { flex: 1; position: relative; width: 100%; background: #fafafa; }

        #trace-area {
            flex: 1.3;
            display: none; 
            position: relative;
            background: #ffffff;
            align-items: center;
            justify-content: center;
            border-top: 4px dashed #cbd5e1;
        }

        .dot {
            background-color: #22c55e;
            border: 4px solid #14532d;
            border-radius: 50%;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        .dot.counted { background-color: #3b82f6; border-color: #1e3a8a; }

        #trace-canvas { position: absolute; top: 0; left: 0; z-index: 25; }

        /* Pedagogical Straight-Line Numerals */
        .trace-prompt {
            font-family: "Trebuchet MS", "Verdana", Arial, sans-serif;
            font-size: 190px;
            color: rgba(0, 0, 0, 0.05);
            -webkit-text-stroke: 4px #cbd5e1;
            font-weight: 400;
            pointer-events: none;
            font-variant-numeric: lining-nums;
        }

        .btn {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            background: #2563eb;
            color: white;
            border-radius: 20px;
            border: none;
            box-shadow: 0 5px 0 #1d4ed8;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="zoo-header">🦁🐯🐘🦛</div>
    <div class="instructions" id="inst">Tap the dots to count! 🦁</div>

    <div class="card-container">
        <div id="object-area"></div>
        <div id="trace-area">
            <div id="trace-template" class="trace-prompt">0</div>
            <canvas id="trace-canvas"></canvas>
        </div>
    </div>

    <button class="btn" id="checkBtn">Check ✅</button>
    <button class="btn hidden" id="nextBtn" onclick="location.reload()">Next Level ➡️</button>

    <script>
        const area = document.getElementById('object-area');
        const traceArea = document.getElementById('trace-area');
        const inst = document.getElementById('inst');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const traceTemplate = document.getElementById('trace-template');
        const canvas = document.getElementById('trace-canvas');
        const ctx = canvas.getContext('2d');

        let count = 0;
        let isTracing = false;

        function initLevel() {
            area.innerHTML = '';
            count = Math.floor(Math.random() * 20) + 1; 
            traceTemplate.innerText = count;
            const dotSize = (count > 10) ? 30 : 45;
            const positions = [];

            for (let i = 0; i < count; i++) {
                let pos;
                let isTooClose = true;
                let attempts = 0;
                while(isTooClose && attempts < 150) {
                    pos = { x: Math.random() * 80 + 10, y: Math.random() * 80 + 10 };
                    isTooClose = positions.some(p => Math.sqrt(Math.pow(p.x - pos.x, 2) + Math.pow(p.y - pos.y, 2)) < 18);
                    attempts++;
                }
                positions.push(pos);
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = dotSize + 'px'; dot.style.height = dotSize + 'px';
                dot.style.left = pos.x + '%'; dot.style.top = pos.y + '%';
                dot.onclick = () => dot.classList.toggle('counted');
                area.appendChild(dot);
            }
        }

        function rearrangeIntoGroups() {
            checkBtn.classList.add('hidden');
            inst.innerText = "Still " + count + "! Now trace it. ✍️";
            const dots = Array.from(document.querySelectorAll('.dot'));
            const groupSize = 5;
            const dotSize = (count > 10) ? 28 : 38;

            dots.forEach((d, i) => {
                d.style.width = dotSize + 'px'; d.style.height = dotSize + 'px';
                const groupIndex = Math.floor(i / groupSize);
                const itemInGroup = i % groupSize;
                const col = itemInGroup % 3;
                const row = Math.floor(itemInGroup / 3);
                const xPos = (groupIndex % 2) * 45 + (col * 10) + 15;
                const yPos = Math.floor(groupIndex / 2) * 35 + (row * 10) + 10;
                d.style.left = xPos + '%'; d.style.top = yPos + '%';
            });

            setTimeout(() => {
                traceArea.style.display = 'flex';
                canvas.width = traceArea.clientWidth;
                canvas.height = traceArea.clientHeight;
                setupTracing();
                nextBtn.classList.remove('hidden');
            }, 5000); // Pedagogical Pause
        }

        function setupTracing() {
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 14; ctx.lineCap = 'round';
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };
            canvas.onmousedown = canvas.ontouchstart = (e) => { e.preventDefault(); isTracing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            window.onmousemove = window.ontouchmove = (e) => { if(!isTracing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            window.onmouseup = window.ontouchend = () => { isTracing = false; };
        }

        checkBtn.onclick = rearrangeIntoGroups;
        window.onload = initLevel;
    </script>
</body>
</html>
